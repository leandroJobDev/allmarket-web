<div class="processar-nota-container">
  <div class="search-bar-wrapper">
    <mat-form-field appearance="fill" class="custom-pill-field">
      <input 
        matInput 
        placeholder="Cole o link da nota..." 
        [(ngModel)]="urlNota" 
        (keyup.enter)="enviarNota()"
        [disabled]="isProcessando">
      
      <button 
        mat-icon-button 
        matSuffix 
        (click)="enviarNota()" 
        [disabled]="isProcessando || !urlNota.trim()"
        class="custom-send-button">
        
        <mat-icon *ngIf="!isProcessando">content_paste</mat-icon>
        
        <mat-progress-spinner
          *ngIf="isProcessando"
          mode="indeterminate"
          diameter="22">
        </mat-progress-spinner>
      </button>
    </mat-form-field>
  </div>
</div>
