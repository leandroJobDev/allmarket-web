<div class="processar-nota-container">
  <div class="search-bar-wrapper">
    <mat-form-field appearance="fill" class="custom-pill-field">
      <input 
        matInput 
        placeholder="Cole o link da nota..." 
        [(ngModel)]="urlNota" 
        (keyup.enter)="enviarNota()"
        [disabled]="loadingService.loading$()">
      
      <button 
        mat-icon-button 
        matSuffix 
        (click)="enviarNota()" 
        [disabled]="loadingService.loading$() || !urlNota.trim()"
        class="custom-send-button">
        
        <mat-icon>content_paste</mat-icon>
        
      </button>
    </mat-form-field>
  </div>
</div>
