<div class="screen-container" *ngIf="!isLoggedIn">
    <mat-card class="login-card">
        <mat-card-content>
            <div class="logo-wrapper">
                <img src="/assets/img/favicon.svg" alt="Ícone AllMarket" class="main-icon">
            </div>

            <div class="brand-section">
                <div class="brand-name">All<span class="text-blue">M@rket</span></div>
                <h3 class="main-title">
                    ESCANEIA. EXAMINA.<br>
                    <span class="text-blue">ECONOMIZA.</span>
                </h3>
            </div>

            <div class="google-slot">
                <div id="google-btn-container"></div>
            </div>

            <p class="welcome-text">
                <span class="sparkle">✨</span> Conecte-se e deixe nossa<br>
                <span class="black-italic">inteligência trabalhar por você</span>
            </p>
        </mat-card-content>
    </mat-card>
</div>

<ng-container *ngIf="isLoggedIn">
    <div class="main-content">
        <app-home *ngIf="!temNotas || erroMfe" [user]="userData"></app-home>

        <div *ngIf="temNotas && !erroMfe" class="loading-state">
            <p>Redirecionando para suas notas...</p>
            <mat-progress-bar mode="indeterminate"></mat-progress-bar>
        </div>
    </div>
</ng-container>
