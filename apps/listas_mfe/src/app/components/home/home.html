<div class="lista-container">
  <header class="list-header">
    <h1>Minha Lista</h1>
    <span class="item-counter">{{ itens.length }} itens</span>
  </header>

  <div class="add-item-card">
    <input type="text" #itemInput (keyup.enter)="adicionarItem(itemInput)" 
           placeholder="O que você precisa?" class="modern-input">
    <button class="btn-add-main" (click)="adicionarItem(itemInput)">
      <mat-icon>add</mat-icon>
    </button>
  </div>

  <div class="suggestions-section" *ngIf="lojasRecentes.length > 0">
    <p class="section-title">Sugestões por loja</p>
    <div class="lojas-scroll">
      <button *ngFor="let loja of lojasRecentes" 
              (click)="abrirEscolhaItens(loja)" 
              [class.active]="lojaSelecionada?.nome === loja.nome"
              class="chip-loja">
        <mat-icon>history</mat-icon>
        {{ loja.nome }}
      </button>
    </div>

    <div class="inline-selection-panel" *ngIf="lojaSelecionada">
      <div class="panel-header">
        <span>Itens frequentes em <strong>{{ lojaSelecionada.nome }}</strong></span>
        <button class="btn-close" (click)="fecharSelecao()">
          <mat-icon>close</mat-icon>
        </button>
      </div>
      
      <div class="panel-body">
        <div *ngFor="let item of itensParaEscolher" class="selectable-item">
          <mat-checkbox [(ngModel)]="item.selecionado" color="primary">
            {{ item.nome }}
          </mat-checkbox>
        </div>
      </div>

      <div class="panel-footer">
        <button class="btn-confirm-action" (click)="confirmarSelecao()">
          ADICIONAR SELECIONADOS
        </button>
      </div>
    </div>
  </div>

  <div class="items-grid">
    <div *ngFor="let item of itens; let i = index" class="item-card-row" [class.is-comprado]="item.comprado">
      <div class="item-info">
        <mat-checkbox [(ngModel)]="item.comprado" (change)="salvarNoStorage()" color="primary"></mat-checkbox>
        <span class="item-name">{{ item.nome }}</span>
      </div>
      <button class="btn-remove" (click)="removerItem(i)">
        <mat-icon>delete_outline</mat-icon>
      </button>
    </div>
  </div>
</div>
